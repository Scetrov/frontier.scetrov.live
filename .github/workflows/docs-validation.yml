name: Docs validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-docs:
    name: Validate documentation (Hugo, linters, spellcheck, linkcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install devDependencies (markdownlint-cli, cspell)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Node & npm versions (debug)
        run: |
          node -v || true
          npm -v || true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo build -d public

      - name: Run markdownlint
        run: npx markdownlint-cli "content/**/*.md" ".github/**/*.md"

      - name: Validate TOML frontmatter
        run: ./.githooks/validate-frontmatter.sh

      - name: Run cspell (spellcheck)
        run: npx cspell "content/**/*.md"

      - name: Set up Go (for htmltest)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'

      - name: Install htmltest
        run: |
          # install htmltest from the module (cmd path changed in upstream releases)
          go install github.com/wjdp/htmltest@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run htmltest (full-site link/HTML checks)
        run: htmltest -c .htmltest.yml -s public
