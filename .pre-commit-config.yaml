repos:
  - repo: local
    hooks:
      - id: validate-docs
        name: Validate docs (Hugo + markdownlint)
        entry: .githooks/pre-commit-checks.sh
        language: script
        pass_filenames: false
      - id: cspell
        name: cspell (spell check)
        entry: npx --yes cspell@9.2.1 "content/**/*.md"
        language: system
        pass_filenames: false
      - id: markdownlint
        name: markdownlint (markdown linter)
        entry: npx --yes markdownlint-cli@0.47.0 "content/**/*.md" ".github/**/*.md"
        language: system
        pass_filenames: false
      - id: lint-mermaid
        name: lint-mermaid (mermaid diagram validation)
        entry: python3 scripts/lint-mermaid.py
        language: system
        pass_filenames: false
        files: '\.md$'
